version: "3.9"

# Production — builds from source.
# Usage:
#   docker compose up --build -d
#
# Generate password hash first:
#   docker run --rm python:3.12-slim \
#     python -c "from passlib.context import CryptContext; print(CryptContext(['bcrypt']).hash('yourpassword'))"

services:
  scanarr:
    build:
      context: .
      dockerfile: Dockerfile
    image: scanarr:latest
    container_name: scanarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config       # DB, encryption key, covers, logs
      - ./manga:/manga         # your manga library
    environment:
      - CONFIG_DIR=/config
      - DATA_DIR=/manga
      - LOG_LEVEL=info
      - PORT=8080
      # ── Auth ─────────────────────────────────────────────────────────
      - AUTH_REQUIRED=true
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD_HASH=    # paste bcrypt hash here
      # ── Timezone ─────────────────────────────────────────────────────
      - TZ=Europe/Paris
      # ── Scheduler ────────────────────────────────────────────────────
      - RSS_POLL_INTERVAL=60
      - QUEUE_SYNC_INTERVAL=30
      - METADATA_REFRESH_INTERVAL=24
    mem_limit: 256m
    mem_reservation: 64m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
